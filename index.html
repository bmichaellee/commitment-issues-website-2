<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commitment Issues — Virginia Beach Rock and/or Roll</title>
  <meta name="description" content="Commitment Issues — a 90s/2000s alt-rock cover band based in Virginia Beach, VA. Weddings, dive bars, backyard 40ths." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;600&family=Syne:wght@800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />

  <!-- SVG chalk displacement filter — referenced by CSS filter:url(#...) -->
  <svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute">
    <defs>
      <!-- hero wordmark chalk filter -->
      <filter id="ci-chalk-hero" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
        <feTurbulence type="turbulence" baseFrequency="0.032 0.028" numOctaves="4" seed="3" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
        <feGaussianBlur in="displaced" stdDeviation="0.4" result="blurred"/>
        <feComposite in="blurred" in2="SourceGraphic" operator="in"/>
      </filter>
      <!-- inline chalk filter for smaller elements -->
      <filter id="ci-chalk" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
        <feTurbulence type="turbulence" baseFrequency="0.05 0.04" numOctaves="3" seed="9" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>
</head>
<body>
  <div id="root">
    <div style="display:grid;place-items:center;min-height:100vh;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;color:#55524d;text-transform:uppercase">
      Unpacking...
    </div>
  </div>

  <!-- React + Babel (no build step) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Load all content JSON, then fetch + transpile the JSX app -->
  <script>
    const CONTENT_FILES = [
      'hero', 'shows', 'setlist', 'band', 'press', 'connect', 'video', 'footer'
    ];

    Promise.all([
      // fetch all JSON content files
      ...CONTENT_FILES.map(name =>
        fetch(`content/${name}.json`).then(r => r.json()).then(data => ['json:' + name, data])
      ),
      // fetch the JSX source
      fetch('js/main.js').then(r => r.text()).then(src => ['__jsx__', src]),
    ]).then(entries => {
      const map = Object.fromEntries(entries);
      const jsxSrc = map['__jsx__'];
      delete map['__jsx__'];

      // expose content under clean keys
      window.CI_CONTENT = {};
      for (const key of CONTENT_FILES) {
        window.CI_CONTENT[key] = map['json:' + key];
      }

      // transpile JSX → JS and eval
      const transformed = Babel.transform(jsxSrc, { presets: ['react'] }).code;
      // eslint-disable-next-line no-eval
      eval(transformed);
    }).catch(err => {
      document.getElementById('root').innerHTML =
        '<div style="color:#ff3a3a;font-family:monospace;padding:40px">Failed to load: ' + err.message + '</div>';
    });
  </script>
</body>
</html>
